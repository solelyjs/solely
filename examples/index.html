<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solely Template Examples</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    h1 {
      color: white;
      text-align: center;
      margin-bottom: 30px;
      font-size: 2.5em;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
    }

    .subtitle {
      color: rgba(255, 255, 255, 0.9);
      text-align: center;
      margin-bottom: 30px;
      font-size: 1.1em;
    }

    .tabs {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    .tab-btn {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }

    .tab-btn:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: translateY(-2px);
    }

    .tab-btn.active {
      background: white;
      color: #667eea;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }

    .content {
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      overflow: hidden;
      min-height: 500px;
    }

    .example-container {
      padding: 20px;
      display: none;
    }

    .example-container.active {
      display: block;
    }

    .section-title {
      color: #333;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid #f0f0f0;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Solely Template 演示</h1>
    <p class="subtitle">基于 Solely 模板引擎的现代 Web 组件示例</p>

    <div class="tabs">
      <button class="tab-btn active" data-tab="counter">🔢 计数器</button>
      <button class="tab-btn" data-tab="form">📋 表单验证</button>
      <button class="tab-btn" data-tab="todo">📝 待办事项</button>
      <button class="tab-btn" data-tab="weather">🌤️ 天气应用</button>
      <button class="tab-btn" data-tab="ref">🔗 元素引用</button>
      <button class="tab-btn" data-tab="router">🧭 路由测试</button>
    </div>

    <div class="content">
      <div class="example-container active" id="counter-example">
        <h2 class="section-title">计数器示例</h2>
        <simple-counter count-id="10" step="5"></simple-counter>
      </div>

      <div class="example-container" id="form-example">
        <h2 class="section-title">表单验证示例</h2>
        <registration-form></registration-form>
      </div>

      <div class="example-container" id="todo-example">
        <h2 class="section-title">待办事项示例</h2>
        <todo-list></todo-list>
      </div>

      <div class="example-container" id="weather-example">
        <h2 class="section-title">天气应用示例</h2>
        <weather-app></weather-app>
      </div>

      <div class="example-container" id="ref-example">
        <h2 class="section-title">元素引用示例</h2>
        <ref-example></ref-example>
      </div>

      <div class="example-container" id="router-example">
        <h2 class="section-title">路由测试示例</h2>
        <router-test></router-test>
      </div>
    </div>
  </div>

  <script type="module">
    // 导入示例组件 - 使用 import * as 确保副作用被保留
    import * as counter from './counter/index.ts';
    import * as todo from './todo/index.ts';
    import * as form from './form/index.ts';
    import * as weather from './weather/index.ts';
    import * as refExample from './ref-example/index.ts';
    import * as routerTest from './router-test/index.ts';

    // 防止 tree-shaking
    console.log('Loaded:', counter, todo, form, weather, refExample, routerTest);

    // Tab switching logic
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.example-container').forEach(c => c.classList.remove('active'));

        btn.classList.add('active');
        const tabId = btn.dataset.tab + '-example';
        document.getElementById(tabId)?.classList.add('active');
      });
    });

    console.log('All examples loaded successfully!');
  </script>
</body>

</html>
