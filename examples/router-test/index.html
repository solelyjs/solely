<div class="router-test">
  <h2>🧭 路由测试页面</h2>
  <p>当前路径: {{ $data.currentPath }}</p>
  <p>路由参数: {{ JSON.stringify($data.params) }}</p>

  <div class="nav-buttons">
    <button @click="this.router.push('/')">首页</button>
    <button @click="this.router.push('/about')">关于</button>
    <button @click="this.router.push('/user/123')">用户 123</button>
    <button @click="this.router.push('/user/456')">用户 456</button>
    <button @click="this.router.push('/search?keyword=hello&category=tech&page=2')">Query参数</button>
    <button class="async-btn" @click="this.router.push('/async')">异步加载成功</button>
    <button class="error-btn" @click="this.router.push('/error-demo')">测试加载错误</button>
    <button @click="this.router.push('/nested/child1')">嵌套路由</button>
    <button class="keepalive-btn" @click="this.router.push('/keepalive')">KeepAlive缓存</button>
    <button @click="this.router.back()">返回</button>
    <button @click="this.router.forward()">前进</button>
  </div>

  <!-- 使用 router-view 动态渲染路由组件 -->
  <router-view></router-view>

  <div class="history-info">
    <h4>导航历史</h4>
    <For each="$data.history" item="item" index="i">
      <div class="history-item">{{ i + 1 }}. {{ item }}</div>
    </For>
  </div>
</div>
