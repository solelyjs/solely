<If test="this.hasIcon()">
    <svg
        ref="svgRef"
        part="base"
        class="icon-svg"
        :class="this.getIconClasses()"
        :viewBox="this.getViewBox()"
        fill="currentColor"
        @click="this.handleClick(event)"
        role="img"
        :aria-label="$data.name"
    ></svg>
</If>
<Else>
    <span part="placeholder" class="icon-placeholder"></span>
</Else>
