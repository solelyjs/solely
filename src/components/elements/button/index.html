<If test="this.getTagName() === 'a'">
    <a
        ref="buttonRef"
        class="btn"
        :class="this.getButtonClasses()"
        :href="$data.href"
        :target="$data.target"
        @click="this.handleClick(event)"
    >
        <If test="$data.loading">
            <!-- 加载状态：显示加载图标 -->
            <span class="btn__icon loading-spinner btn__loading-icon">{{this.getLoadingIcon()}}</span>
        </If>
        <ElseIf test="this.hasIconSlot()">
            <!-- 非加载状态，有图标插槽：显示图标插槽内容 -->
            <span class="btn__icon">
                <slot name="icon"></slot>
            </span>
        </ElseIf>
        <ElseIf test="$data.icon">
            <!-- 非加载状态，有图标属性：显示图标 -->
            <span class="btn__icon">{{$data.icon}}</span>
        </ElseIf>

        <If test="!$data.loading && !$data.iconOnly && ($data.content || this.hasDefaultSlotContent())">
            <!-- 按钮内容（非加载状态且非 icon-only 模式显示） -->
            <span class="btn__content">
                <slot>{{$data.content}}</slot>
            </span>
        </If>

        <If test="!$data.loading && !$data.iconOnly && this.hasIconRightSlot()">
            <!-- 右侧图标插槽（非加载状态且非 icon-only 模式显示） -->
            <span class="btn__icon-right">
                <slot name="icon-right"></slot>
            </span>
        </If>
        <ElseIf test="!$data.loading && !$data.iconOnly && $data.iconRight">
            <!-- 右侧图标属性（非加载状态且非 icon-only 模式显示） -->
            <span class="btn__icon-right">{{$data.iconRight}}</span>
        </ElseIf>
    </a>
</If>
<ElseIf test="this.getTagName() === 'button'">
    <button
        ref="buttonRef"
        class="btn"
        :class="this.getButtonClasses()"
        :disabled="$data.disabled || $data.loading"
        @click="this.handleClick(event)"
    >
        <If test="$data.loading">
            <!-- 加载状态：显示加载图标 -->
            <span class="btn__icon loading-spinner btn__loading-icon">{{this.getLoadingIcon()}}</span>
        </If>
        <ElseIf test="this.hasIconSlot()">
            <!-- 非加载状态，有图标插槽：显示图标插槽内容 -->
            <span class="btn__icon">
                <slot name="icon"></slot>
            </span>
        </ElseIf>
        <ElseIf test="$data.icon">
            <!-- 非加载状态，有图标属性：显示图标 -->
            <span class="btn__icon">{{$data.icon}}</span>
        </ElseIf>

        <If test="!$data.loading && !$data.iconOnly && ($data.content || this.hasDefaultSlotContent())">
            <!-- 按钮内容（非加载状态且非 icon-only 模式显示） -->
            <span class="btn__content">
                <slot>{{$data.content}}</slot>
            </span>
        </If>

        <If test="!$data.loading && !$data.iconOnly && this.hasIconRightSlot()">
            <!-- 右侧图标插槽（非加载状态且非 icon-only 模式显示） -->
            <span class="btn__icon-right">
                <slot name="icon-right"></slot>
            </span>
        </If>
        <ElseIf test="!$data.loading && !$data.iconOnly && $data.iconRight">
            <!-- 右侧图标属性（非加载状态且非 icon-only 模式显示） -->
            <span class="btn__icon-right">{{$data.iconRight}}</span>
        </ElseIf>
    </button>
</ElseIf>
