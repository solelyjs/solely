<div part="base" class="tree" :class="this.getTreeClasses()" role="tree">
    <ul part="list" class="tree__list">
        <For each="$data.flattenedTree" item="node">
            <li
                part="node"
                class="tree__node"
                :class="this.getNodeClasses(node)"
                :style="'padding-left: ' + (node.level * 24 + 12) + 'px'"
                role="treeitem"
                :aria-expanded="node.children && node.children.length > 0 ? (node.expanded ? 'true' : 'false') : undefined"
                :aria-selected="node.selected ? 'true' : 'false'"
                :aria-disabled="node.disabled ? 'true' : 'false'"
                :aria-level="node.level + 1"
            >
                <div
                    part="content"
                    class="tree__content"
                    :class="this.getContentClasses(node)"
                    @click="this.handleNodeClick(node)"
                >
                    <!-- 展开/折叠图标 -->
                    <span
                        part="switcher"
                        class="tree__switcher"
                        :class="this.getSwitcherClasses(node)"
                        @click="this.handleToggle(node, event)"
                        role="button"
                        :aria-label="node.expanded ? '折叠' : '展开'"
                        tabindex="0"
                    >
                        ▶
                    </span>

                    <!-- 复选框 -->
                    <If condition="$data.checkable">
                        <span
                            part="checkbox"
                            class="tree__checkbox"
                            :class="this.getCheckboxClasses(node)"
                            @click="this.handleCheck(node, event)"
                            role="checkbox"
                            :aria-checked="node.halfChecked ? 'mixed' : (node.checked ? 'true' : 'false')"
                            :aria-disabled="node.disabled ? 'true' : 'false'"
                            tabindex="0"
                        ></span>
                    </If>

                    <!-- 节点图标 -->
                    <If condition="node.icon">
                        <span part="icon" class="tree__icon">{{node.icon}}</span>
                    </If>

                    <!-- 节点标题 -->
                    <span part="title" class="tree__title">{{node.title}}</span>
                </div>
            </li>
        </For>
    </ul>
</div>
