<div
    part="base"
    class="form-control"
    :class="this.getWrapperClasses()"
>
    <!-- prefix 插槽 -->
    <If test="this.hasPrefixSlot()">
        <span part="prefix" class="form-control__prefix">
            <slot name="prefix"></slot>
        </span>
    </If>
    <ElseIf test="$data.prefix">
        <span part="prefix" class="form-control__prefix">{{$data.prefix}}</span>
    </ElseIf>

    <If test="$data.type === 'textarea'">
        <textarea
            part="input"
            class="form-control__input form-control__textarea"
            :value="$data.value"
            :placeholder="$data.placeholder"
            :disabled="$data.disabled"
            :readonly="$data.readonly"
            :maxlength="$data.maxlength"
            :minlength="$data.minlength"
            :rows="$data.rows"
            :aria-disabled="$data.disabled ? 'true' : 'false'"
            :aria-readonly="$data.readonly ? 'true' : 'false'"
            :aria-invalid="$data.status === 'error' ? 'true' : 'false'"
            @input="this.handleInput(event)"
            @focus="this.handleFocus(event)"
            @blur="this.handleBlur(event)"
            @change="this.handleChange(event)"
            @keydown="this.handleKeydown(event)"
        ></textarea>
    </If>
    <Else>
        <input
            part="input"
            class="form-control__input"
            :type="$data.passwordVisible && $data.type === 'password' ? 'text' : $data.type"
            :value="$data.value"
            :placeholder="$data.placeholder"
            :disabled="$data.disabled"
            :readonly="$data.readonly"
            :maxlength="$data.maxlength"
            :minlength="$data.minlength"
            :aria-disabled="$data.disabled ? 'true' : 'false'"
            :aria-readonly="$data.readonly ? 'true' : 'false'"
            :aria-invalid="$data.status === 'error' ? 'true' : 'false'"
            @input="this.handleInput(event)"
            @focus="this.handleFocus(event)"
            @blur="this.handleBlur(event)"
            @change="this.handleChange(event)"
            @keydown="this.handleKeydown(event)"
        />
    </Else>

    <If test="$data.clearable && $data.value && !$data.disabled">
        <span
            part="clear"
            class="close-btn form-control__clear"
            @click="this.handleClear(event)"
        >×</span>
    </If>
    <ElseIf test="$data.type === 'password' && $data.showpassword">
        <span
            part="password-toggle"
            class="form-control__password-toggle"
            @click="this.togglePassword(event)"
        >{{$data.passwordVisible ? '🙈' : '👁'}}</span>
    </ElseIf>
    <ElseIf test="$data.copyable && $data.value">
        <span
            part="copy"
            class="form-control__copy"
            @click="this.handleCopy(event)"
        >📋</span>
    </ElseIf>
    <ElseIf test="this.hasSuffixSlot()">
        <span part="suffix" class="form-control__suffix">
            <slot name="suffix"></slot>
        </span>
    </ElseIf>
    <ElseIf test="$data.suffix">
        <span part="suffix" class="form-control__suffix">{{$data.suffix}}</span>
    </ElseIf>

    <If test="$data.suggestions && $data.suggestions.length > 0 && this.filteredSuggestions && this.filteredSuggestions.length > 0">
        <div part="dropdown" class="dropdown">
            <For each="this.filteredSuggestions" item="suggestion">
                <div
                    part="dropdown-item"
                    class="dropdown__item"
                    @click="this.selectSuggestion(suggestion)"
                >{{suggestion}}</div>
            </For>
        </div>
    </If>
</div>

<If test="$data.showcount && $data.maxlength">
    <div part="count" class="form-control__count">
        <span class="form-control__count-current">{{this.getCharCount()}}</span>
        <span class="form-control__count-separator">/</span>
        <span class="form-control__count-max">{{$data.maxlength}}</span>
    </div>
</If>

<If test="$data.message">
    <div part="message" class="form-control__message form-control__message--{{$data.status || 'default'}}">
        {{$data.message}}
    </div>
</If>
