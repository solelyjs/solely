<div part="base" class="steps" :class="this.getStepsClasses()" role="list" aria-label="步骤条">
    <!-- 使用 items 属性时的渲染 -->
    <If test="!$data.useSlot">
        <For each="this.getParsedItems()" item="item" index="index">
            <div
                part="step"
                class="step"
                :class="this.getStepClasses(item, index)"
                role="listitem"
                :aria-current="this.getStepStatus(index) === 'process' ? 'step' : undefined"
                :aria-disabled="item.disabled ? 'true' : 'false'"
                @click="this.handleStepClick(item, index)"
            >
                <div part="tail" class="step__tail"></div>
                <div part="wrapper" class="step__wrapper">
                    <div part="icon-wrapper" class="step__icon-wrapper" :class="this.getIconClasses(item)"
                        :style="item.icon ? this.getIconStyle(item) : ''">
                        <div part="icon" class="step__icon">
                            <If test="!$data.progressDot">
                                <If
                                    test="item.icon || this.getStepStatus(index) === 'finish' || this.getStepStatus(index) === 'error'">
                                    <span part="icon-substitution" class="step__icon-substitution">{{this.getStepIcon(item, index)}}</span>
                                </If>
                                <Else>
                                    <span part="icon-text" class="step__icon-text">{{index + 1}}</span>
                                </Else>
                            </If>
                        </div>
                    </div>
                    <div part="content" class="step__content">
                        <div part="title" class="step__title">{{item.title}}</div>
                        <If test="item.description">
                            <div part="description" class="step__description">{{item.description}}</div>
                        </If>
                    </div>
                </div>
            </div>
        </For>
    </If>

    <!-- 使用插槽时的渲染 -->
    <If test="$data.useSlot">
        <For each="$data.slotItems" item="slotItem" index="index">
            <div
                part="step"
                class="step"
                :class="this.getSlotStepClasses(slotItem, index)"
                role="listitem"
                :aria-current="this.getSlotStepStatus(index) === 'process' ? 'step' : undefined"
                :aria-disabled="slotItem.disabled ? 'true' : 'false'"
                @click="this.handleSlotStepClick(slotItem, index)"
            >
                <div part="tail" class="step__tail"></div>
                <div part="wrapper" class="step__wrapper">
                    <div part="icon-wrapper" class="step__icon-wrapper">
                        <div part="icon" class="step__icon">
                            <If test="!$data.progressDot">
                                <!-- 使用插槽元素的 innerHTML 作为图标内容 -->
                                <span part="icon-substitution" class="step__icon-substitution" :innerHTML="slotItem.iconHtml"></span>
                            </If>
                        </div>
                    </div>
                    <div part="content" class="step__content">
                        <div part="title" class="step__title">{{slotItem.title}}</div>
                        <If test="slotItem.description">
                            <div part="description" class="step__description">{{slotItem.description}}</div>
                        </If>
                    </div>
                </div>
            </div>
        </For>
    </If>
</div>
