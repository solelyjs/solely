<div part="wrapper" class="tooltip-wrapper" @mouseenter="this.handleMouseEnter(event)" @mouseleave="this.handleMouseLeave(event)" @click="this.handleClick(event)">
    <slot></slot>
    <If test="$data.visible">
        <div ref="tooltipRef" part="base" class="tooltip" :class="this.getTooltipClasses()">
            <div part="content" class="tooltip__content">{{ $data.content }}</div>
            <div ref="arrowRef" part="arrow" class="tooltip__arrow"></div>
        </div>
    </If>
</div>
